<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>monco.io | 3D divertido</title>
<style>
/* ── Ant Design token palette (dark theme adapted) ──────────────── */
:root {
  /* Seed tokens */
  --ant-color-primary:        #1677ff;
  --ant-color-success:        #52c41a;
  --ant-color-warning:        #faad14;
  --ant-color-error:          #ff4d4f;
  --ant-color-info:           #1677ff;
  /* Neutral */
  --ant-color-bg-base:        #141414;
  --ant-color-bg-container:   #1f1f1f;
  --ant-color-bg-elevated:    #2a2a2a;
  --ant-color-bg-spotlight:   #383838;
  --ant-color-border:         #303030;
  --ant-color-border-secondary: #2a2a2a;
  --ant-color-text:           rgba(255,255,255,.88);
  --ant-color-text-secondary: rgba(255,255,255,.65);
  --ant-color-text-tertiary:  rgba(255,255,255,.45);
  --ant-color-text-quaternary:rgba(255,255,255,.25);
  --ant-color-fill:           rgba(255,255,255,.18);
  --ant-color-fill-secondary: rgba(255,255,255,.12);
  --ant-color-fill-tertiary:  rgba(255,255,255,.08);
  /* Border radius */
  --ant-border-radius:        6px;
  --ant-border-radius-lg:     8px;
  --ant-border-radius-sm:     4px;
  /* Font */
  --ant-font-family:          -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --ant-font-size:            14px;
  --ant-font-size-sm:         12px;
  --ant-font-size-lg:         16px;
  /* Motion */
  --ant-motion-duration-fast: .1s;
  --ant-motion-duration-mid:  .2s;
  /* Layout dims */
  --hdr:  90px;
  --bot:  100px;
  --lsb:  104px;
  --rsb: 160px;
  --tgm:   0px; /* controlled by JS */
}

/* ── Reset ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;
  background:var(--ant-color-bg-base);
  font-family:var(--ant-font-family);
  font-size:var(--ant-font-size);
  color:var(--ant-color-text)}
button{cursor:pointer;border:none;font-family:inherit;background:none}

/* ── APP SHELL — full-page flex column ──────────────────────────── */
#app{display:flex;flex-direction:column;width:100vw;height:100dvh;overflow:hidden}

/* ── HEADER ─────────────────────────────────────────────────────── */
#hdr{
  flex-shrink:0;height:var(--hdr);
  background:var(--ant-color-bg-container);
  border-bottom:1px solid var(--ant-color-border);
  display:flex;align-items:center;gap:8px;padding:0 16px;z-index:100;
}
#logo{font-size:40px;font-weight:700;color:#1677ff;letter-spacing:-.5px;flex-shrink:0}
#logo span{color:#faad14}
.hdr-btn{
  background:transparent;color:var(--ant-color-text-secondary);
  border:1px solid transparent;border-radius:var(--ant-border-radius);
  padding:10px 24px;font-size:26px;font-weight:600;
  transition:all var(--ant-motion-duration-mid);flex-shrink:0;
}
.hdr-btn:hover{border-color:var(--ant-color-border);color:var(--ant-color-text)}
.hdr-btn.active{background:#1677ff20;color:#1677ff;border-color:#1677ff}
.hdr-btn:disabled{opacity:.35;cursor:default}
#score-badge{
  margin-left:auto;
  background:var(--ant-color-fill-secondary);
  border:1px solid var(--ant-color-warning);
  border-radius:100px;padding:3px 14px;
  display:flex;align-items:center;gap:5px;
  font-size:20px;font-weight:700;color:var(--ant-color-warning);flex-shrink:0;
}
#cert-btn{
  background:#1677ff;color:#fff;
  border-radius:var(--ant-border-radius);
  padding:10px 22px;font-size:20px;font-weight:600;
  flex-shrink:0;transition:opacity var(--ant-motion-duration-fast);
}
#cert-btn:hover{opacity:.85}

/* Botão layers fixo no stage */
#btn-layers-fixed{
  position:absolute;
  top:10px;left:10px;z-index:31;
  background:rgba(10,12,20,.65);
  border:1px solid rgba(255,255,255,.18);
  border-radius:8px;padding:5px 8px;
  font-size:12px;cursor:pointer;
  color:rgba(255,255,255,.65);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;gap:4px;
  transition:all .15s;
}
#btn-layers-fixed:hover{border-color:#1677ff;color:#1677ff}
#btn-layers-fixed.active{border-color:#1677ff;color:#1677ff;background:rgba(22,119,255,.15)}

/* Painel de layers */
#layers-panel{
  position:absolute;
  top:48px;left:10px;z-index:30;
  width:220px;
  background:rgba(10,12,20,.5);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:8px 0;
  display:none;
  flex-direction:column;
  max-height:50vh;
  overflow:hidden;
  user-select:none;
}
#layers-panel.open{display:flex}
#layers-panel .lp-header{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.5);
  text-transform:uppercase;letter-spacing:.08em;
  padding:0 10px 6px;border-bottom:1px solid rgba(255,255,255,.08);
  flex-shrink:0;cursor:move;
}
#layers-list{
  overflow-y:auto;flex:1;scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.15) transparent;
}
.layer-item{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px;cursor:pointer;
  transition:background .15s;
  font-size:11px;color:rgba(255,255,255,.75);
}
.layer-item:hover{background:rgba(255,255,255,.06)}
.layer-item.selected{background:rgba(22,119,255,.2);color:#fff}
.layer-item.hidden-layer{opacity:.4}
.layer-vis{
  width:16px;height:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;
}
.layer-icon{font-size:13px;flex-shrink:0}
.layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-id{font-size:9px;color:rgba(255,255,255,.3);flex-shrink:0}
.layer-arrows{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.layer-arr{
  background:none;border:none;color:rgba(255,255,255,.35);
  font-size:9px;cursor:pointer;padding:0 2px;line-height:1.2;
  transition:color .1s;
}
.layer-arr:hover{color:#fff}

/* Botão olho no header */
#btn-layers{
  background:none;border:1px solid var(--ant-color-border);
  border-radius:6px;padding:5px 10px;font-size:16px;
  cursor:pointer;flex-shrink:0;color:var(--ant-color-text-secondary);
  transition:all .15s;
}
#btn-layers:hover{border-color:#1677ff;color:#1677ff}
#btn-layers.active{border-color:#1677ff;color:#1677ff;background:rgba(22,119,255,.1)}

/* Botão 3D flutuante */
#btn-3d-float{
  position:absolute;bottom:16px;right:16px;z-index:200;
  width:80px;height:80px;border-radius:16px;
  background:linear-gradient(135deg,#1677ff,#0958d9);
  border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  box-shadow:0 8px 24px rgba(22,119,255,.4), 5px 5px 0 0 rgba(0,0,0,.6);
  transition:all .25s;
}
#btn-3d-float:hover{transform:scale(1.08);box-shadow:0 12px 32px rgba(22,119,255,.6), 5px 5px 0 0 rgba(0,0,0,.6)}
#btn-3d-float .lbl-3d{
  font-size:28px;font-weight:900;color:#fff;line-height:1;
  text-shadow:2px 2px 0 rgba(0,0,0,.3);letter-spacing:-1px;
}
#btn-3d-float .lbl-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.8);letter-spacing:.05em}
/* estado "Sair" */
#btn-3d-float.exit-mode{
  background:linear-gradient(135deg,#ff4d4f,#cf1322);
  box-shadow:0 8px 24px rgba(255,77,79,.5);
}
#btn-3d-float.exit-mode:hover{box-shadow:0 12px 32px rgba(255,77,79,.7)}

/* Popover de extrusão */
#extrude-pop{
  position:fixed;z-index:500;
  background:var(--ant-color-bg-elevated);
  border:1px solid var(--ant-color-border);
  border-radius:12px;padding:14px 18px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  display:none;flex-direction:column;gap:10px;min-width:180px;
}
#extrude-pop.open{display:flex}
#extrude-pop .ep-title{font-size:12px;font-weight:700;color:var(--ant-color-text-secondary);text-transform:uppercase;letter-spacing:.06em}
#extrude-pop .ep-row{display:flex;align-items:center;gap:8px}
#extrude-pop .ep-swatch{width:24px;height:24px;border-radius:50%;flex-shrink:0}
#extrude-pop label{font-size:13px;color:var(--ant-color-text);flex:1}
#extrude-pop input[type=number]{
  width:64px;padding:4px 8px;border-radius:6px;
  background:var(--ant-color-fill-tertiary);
  border:1px solid var(--ant-color-border);
  color:var(--ant-color-text);font-size:13px;font-weight:600;text-align:right;
}
#extrude-pop .ep-close{
  align-self:flex-end;font-size:11px;color:var(--ant-color-text-tertiary);
  cursor:pointer;padding:2px 6px;border-radius:4px;
  border:1px solid var(--ant-color-border);
}
#extrude-pop .ep-close:hover{color:var(--ant-color-text)}

/* ── BODY ROW — flex row, fills between hdr and bot ────────────── */
#body-row{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── LEFT SIDEBAR ───────────────────────────────────────────────── */
#lsb{
  flex-shrink:0;width:var(--lsb);
  background:var(--ant-color-bg-container);
  border-right:1px solid var(--ant-color-border);
  display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:8px 5px;overflow-y:auto;scrollbar-width:none;
}
#lsb::-webkit-scrollbar{display:none}
.lsb-label{
  font-size:9px;font-weight:700;color:var(--ant-color-text-tertiary);
  text-transform:uppercase;letter-spacing:.08em;text-align:center;flex-shrink:0;
}
.lsb-sep{width:74px;height:1px;background:var(--ant-color-border);flex-shrink:0;margin:3px 0}
.shape-btn{
  width:90px;height:75px;border-radius:var(--ant-border-radius);
  background:var(--ant-color-fill-tertiary);
  border:1px solid var(--ant-color-border);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--ant-motion-duration-mid);flex-shrink:0;
}
.shape-btn:hover{border-color:#1677ff;background:rgba(22,119,255,.08)}
.shape-btn.active{border-color:#1677ff;background:rgba(22,119,255,.2);
  box-shadow:0 0 0 3px #1677ff,0 0 18px rgba(22,119,255,.65)}

/* ── STAGE ──────────────────────────────────────────────────────── */
#stage{flex:1;position:relative;background:#0a0c14;overflow:hidden;min-width:0}
#canvas2d{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
#three-mount{position:absolute;inset:0;display:none}
#three-mount canvas{width:100%!important;height:100%!important;display:block}
#hint2d{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;pointer-events:none;
  opacity:.12;transition:opacity .3s}
#hint2d .big{font-size:52px}
#hint2d .txt{font-size:14px;font-weight:600;color:var(--ant-color-text-secondary)}
#hole-badge{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,77,79,.85);border:1px solid #ff4d4f;
  border-radius:100px;padding:3px 14px;font-size:12px;font-weight:700;
  color:#fff;pointer-events:none;display:none}
/* zoom overlay no viewport */
#vp-zoom-bar{
  position:absolute;top:10px;right:10px;left:auto;z-index:20;
  display:flex;align-items:center;gap:4px;
  background:rgba(10,12,20,.75);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:5px 8px;backdrop-filter:blur(4px);
}
.vpz-btn{
  background:var(--ant-color-fill-secondary);color:var(--ant-color-text);
  border:1px solid var(--ant-color-border);border-radius:5px;
  width:26px;height:26px;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s;
}
.vpz-btn:hover{border-color:#1677ff;color:#1677ff}
#vpz-val{font-size:11px;font-weight:700;color:var(--ant-color-text-secondary);
  min-width:40px;text-align:center}
.vpz-sep{width:1px;height:18px;background:rgba(255,255,255,.12);flex-shrink:0}

/* Régua de escala */
#scale-ruler{
  position:absolute;bottom:14px;left:14px;z-index:20;
  display:flex;flex-direction:column;align-items:flex-start;gap:2px;
  pointer-events:none;
}
#scale-ruler .ruler-bar{
  height:4px;background:#fff;border-radius:2px;
  position:relative;
  /* largura definida por JS via style.width */
}
#scale-ruler .ruler-bar::before,
#scale-ruler .ruler-bar::after{
  content:'';position:absolute;top:0;width:2px;height:8px;background:#fff;border-radius:1px;
}
#scale-ruler .ruler-bar::before{left:0;top:-2px;}
#scale-ruler .ruler-bar::after{right:0;top:-2px;}
#scale-ruler .ruler-lbl{
  font-size:10px;font-weight:700;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.8);letter-spacing:.03em;
}

#fh-cursor{position:absolute;pointer-events:none;border-radius:50%;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.4);
  display:none;transform:translate(-50%,-50%)}

/* ── RIGHT SIDEBAR ──────────────────────────────────────────────── */
#rsb{
  flex-shrink:0;width:var(--rsb);
  background:var(--ant-color-bg-container);
  border-left:1px solid var(--ant-color-border);
  display:flex;flex-direction:column;padding:8px 8px;gap:4px;
  overflow-y:auto;scrollbar-width:none;
}
#rsb::-webkit-scrollbar{display:none}
.rsb-title{font-size:10px;font-weight:700;color:var(--ant-color-text-tertiary);
  text-transform:uppercase;letter-spacing:.08em;padding:2px 4px;flex-shrink:0}
.ach{
  background:var(--ant-color-fill-tertiary);
  border:1px solid var(--ant-color-border);
  border-radius:var(--ant-border-radius);
  padding:6px 8px;display:flex;align-items:center;gap:6px;
  flex-shrink:0;transition:all .3s;
}
.ach.done{border-color:#52c41a;background:rgba(82,196,26,.08)}
.ach-icon{font-size:15px;flex-shrink:0;opacity:.35;filter:grayscale(1);transition:all .3s}
.ach.done .ach-icon{opacity:1;filter:none}
.ach-body{flex:1;min-width:0}
.ach-name{font-size:11px;font-weight:600;color:var(--ant-color-text);line-height:1.2}
.ach-pts{font-size:10px;color:var(--ant-color-text-tertiary);font-weight:700;transition:color .3s}
.ach.done .ach-pts{color:#52c41a}
.ach-check{font-size:13px;opacity:0;transition:opacity .3s;flex-shrink:0}
.ach.done .ach-check{opacity:1}

/* ── BOTTOM BAR ─────────────────────────────────────────────────── */
#bot{
  flex-shrink:0;height:var(--bot);
  background:var(--ant-color-bg-container);
  border-top:1px solid var(--ant-color-border);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 12px;
  overflow-x:auto;scrollbar-width:none;
}
#bot::-webkit-scrollbar{display:none}
.bot-sep{width:1px;height:36px;background:var(--ant-color-border);flex-shrink:0}
/* colour swatches */
.col-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;
  flex-shrink:0;cursor:pointer}
.col-sw{width:52px;height:52px;border-radius:50%;
  border:2px solid var(--ant-color-border);transition:all .12s;flex-shrink:0}
.col-wrap.active .col-sw{border:2px solid #fff;transform:scale(1.2)}
.col-lbl{font-size:13px;font-weight:700;color:var(--ant-color-text-tertiary);white-space:nowrap}
.col-wrap.active .col-lbl{color:var(--ant-color-text)}
.col-sw.hole{background:#111;position:relative}
.col-sw.hole::after{content:"⊖";position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;font-size:14px;color:#ff4d4f}
/* tool buttons */
.tool-btn{
  width:86px;height:86px;border-radius:var(--ant-border-radius);
  background:var(--ant-color-fill-tertiary);
  border:1px solid var(--ant-color-border);
  font-size:36px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all var(--ant-motion-duration-mid);color:var(--ant-color-text);
}
.tool-btn:hover{border-color:var(--ant-color-text-secondary)}
.tool-btn.active{background:rgba(22,119,255,.18);border-color:#1677ff;color:#1677ff;box-shadow:0 0 0 3px #1677ff,0 0 20px rgba(22,119,255,.65)}
.tool-btn.danger.active{background:rgba(255,77,79,.15);border-color:#ff4d4f;color:#ff4d4f}
.tool-btn:disabled{opacity:.3;cursor:default}
/* STL btn */
.btn-stl{
  border-radius:var(--ant-border-radius);padding:7px 14px;
  font-size:12px;font-weight:700;
  background:#faad14;color:#000;
  display:flex;align-items:center;gap:5px;flex-shrink:0;
  transition:opacity var(--ant-motion-duration-fast);
}
.btn-stl:hover{opacity:.85}
.btn-stl:disabled{opacity:.35;cursor:default}
.btn-io{
  border-radius:var(--ant-border-radius);padding:6px 11px;
  font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:4px;flex-shrink:0;
  background:var(--ant-color-fill-tertiary);
  color:var(--ant-color-text-secondary);
  border:1px solid var(--ant-color-border);
  transition:all var(--ant-motion-duration-fast);
}
.btn-io:hover{border-color:#1677ff;color:#1677ff}
#load-input{display:none}
/* viewport controls */
.vp-btn{
  border-radius:var(--ant-border-radius);padding:5px 9px;
  font-size:12px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:3px;flex-shrink:0;
  background:var(--ant-color-fill-secondary);
  color:var(--ant-color-text-secondary);
  border:1px solid var(--ant-color-border);
  transition:all var(--ant-motion-duration-fast);
}
.vp-btn:hover{border-color:var(--ant-color-primary);color:var(--ant-color-primary)}
.vp-btn.active{background:var(--ant-color-primary-bg);border-color:var(--ant-color-primary);color:var(--ant-color-primary)}
#zoom-val{font-size:11px;color:var(--ant-color-text-tertiary);min-width:36px;text-align:center;flex-shrink:0}

/* ── TOAST ──────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(var(--bot)+14px);left:50%;
  transform:translateX(-50%) translateY(16px);
  background:#52c41a;color:#fff;
  border-radius:100px;padding:7px 20px;
  font-size:13px;font-weight:600;
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#ach-pop{
  position:fixed;top:calc(var(--hdr)+10px);right:calc(var(--rsb)+10px);
  background:#52c41a;color:#fff;border-radius:var(--ant-border-radius-lg);
  padding:9px 16px;font-size:13px;font-weight:600;
  opacity:0;transform:translateY(-8px);transition:all .35s;z-index:998;pointer-events:none;
}
#ach-pop.show{opacity:1;transform:translateY(0)}

/* Popup central de conquista */
#ach-popup{
  position:fixed;top:calc(var(--hdr) + 20px);left:50%;
  transform:translateX(-50%) translateY(-20px) scale(.85);
  z-index:1001;pointer-events:none;
  background:linear-gradient(135deg,#0d1117,#1a2535);
  border:2px solid #52c41a;border-radius:24px;
  padding:24px 44px;text-align:center;
  opacity:0;transition:all .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 12px 40px rgba(0,0,0,.7),0 0 30px rgba(82,196,26,.3);
  min-width:260px;
}
#ach-popup.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
#ach-popup .pop-icon{font-size:64px;display:block;margin-bottom:12px;line-height:1}
#ach-popup .pop-name{font-size:26px;font-weight:800;color:#fff;margin-bottom:8px}
#ach-popup .pop-pts{font-size:20px;font-weight:700;color:#52c41a}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:1000;display:none}

/* ── CERTIFICATE ─────────────────────────────────────────────────── */
#cert-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:none;align-items:center;justify-content:center;padding:12px}
#cert-modal.open{display:flex}
#cert-inner{
  background:#C8922A;border-radius:16px;
  width:min(720px,98vw);max-height:96vh;overflow:hidden;
  position:relative;display:grid;grid-template-columns:1fr 1fr;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
#cert-deco{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
#cert-left{
  background:#f5d060;border-radius:14px 0 0 14px;
  padding:28px 20px 20px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;text-align:center;
  position:relative;z-index:1;
}
#cert-left .cert-logo{font-size:16px;font-weight:800;color:#7a4a00}
#cert-left .cert-logo span{color:#1677ff}
#cert-left .cert-title{font-size:20px;font-weight:900;color:#7a4a00;line-height:1.1;margin:5px 0 2px}
#cert-left .cert-sub2{font-size:10px;color:#a06000;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
#cert-name-in{border:2px solid #c8922a;border-radius:var(--ant-border-radius);
  padding:7px 10px;font-size:14px;width:100%;margin:8px 0 3px;
  font-family:inherit;background:#fff8e8;color:#5c3400;text-align:center}
.cert-name-show{font-size:18px;font-weight:800;color:#5c3400;min-height:26px;margin:2px 0 6px}
.cert-stars-row{display:flex;gap:3px;justify-content:center;margin:5px 0}
.cert-star-svg{width:28px;height:28px}
.cert-star-svg.lit path{fill:#ff9900}
.cert-star-svg.dim path{fill:#d4a84b}
.cert-score-wrap{background:#fff8e8;border-radius:12px;padding:7px 16px;margin:3px 0}
.cert-score-num{font-size:36px;font-weight:900;color:#7a4a00;line-height:1}
.cert-score-lbl{font-size:10px;font-weight:700;color:#a06000;text-transform:uppercase;letter-spacing:.1em}
#cert-right{padding:20px 18px 16px 14px;display:flex;flex-direction:column;
  gap:6px;position:relative;z-index:1;overflow-y:auto}
#cert-right h2{font-size:12px;font-weight:800;color:#fff8e0;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.cert-achs{display:flex;flex-direction:column;gap:3px;flex:1}
.cert-ach-tag{background:rgba(255,255,255,.18);border-radius:100px;
  padding:3px 10px;font-size:11px;font-weight:600;color:#fff8e0;
  display:flex;align-items:center;gap:5px}
.cert-ach-tag.done{background:rgba(255,255,255,.36);color:#fff}
.cert-ach-tag .dot{width:6px;height:6px;border-radius:50%;
  background:rgba(255,248,224,.4);flex-shrink:0}
.cert-ach-tag.done .dot{background:#52c41a}
.cert-actions{display:flex;gap:6px;margin-top:auto;padding-top:6px}
.cert-print{background:#141414;color:#fff;border-radius:var(--ant-border-radius);
  padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;
  border:none;font-family:inherit;flex:1}
.cert-close-btn{background:rgba(255,255,255,.2);color:#fff;
  border-radius:var(--ant-border-radius);padding:8px 12px;
  font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
@media print{
  #cert-modal{position:fixed;inset:0;background:none;padding:0;display:flex!important;
    align-items:center;justify-content:center}
  #cert-inner{width:100%;max-height:none;box-shadow:none}
  .cert-actions{display:none}
  #cert-name-in{display:none!important}
  #cert-name-show{display:block!important}
  body>*:not(#cert-modal){display:none!important}
  @page{size:landscape;margin:.5cm}
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->

    <!-- Botão layers fixo (sempre visível) -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════
// COLOUR → Z mapping  (mm)
// ═══════════════════════════════════════
// Paleta PICO-8 completa (8 cores + furo)
const PICO8_PALETTE = [
  { hex:'#29adff', label:'1 mm',  z:1,  name:'Azul'    },
  { hex:'#ff6b35', label:'3 mm',  z:3,  name:'Laranja'  },
  { hex:'#ffec27', label:'5 mm',  z:5,  name:'Amarelo'  },
  { hex:'#ff004d', label:'3 mm',  z:3,  name:'Vermelho' },
  { hex:'#00e436', label:'3 mm',  z:3,  name:'Verde'    },
  { hex:'#7e2553', label:'3 mm',  z:3,  name:'Roxo'     },
  { hex:'#ff77a8', label:'3 mm',  z:3,  name:'Rosa'     },
  { hex:'#ab5236', label:'3 mm',  z:3,  name:'Castanho' },
];
// Começa com 3 cores activas
const COLOR_DEFS = [
  PICO8_PALETTE[0], // Azul
  PICO8_PALETTE[1], // Laranja
  PICO8_PALETTE[2], // Amarelo
  { hex:'#000000', label:'Furo',  z:0,  name:'Orifício', hole:true },
];
const HOLE_COLOR  = '#000000'; // sempre o último de COLOR_DEFS
const Z_FREEHAND  = 6;   // mm — livre ligeiramente mais alto que amarelo (5mm)
const SHAPE_SIZE  = 120;

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let mode       = '2d';
let activeTool = 'select';   // select | erase | freehand
let activeColor = COLOR_DEFS[0].hex;
let shapes     = [];
let selectedIds= new Set();  // multi-select via lasso
let nextId     = 1;
let drag       = null;

// ── Viewport (zoom + pan) ───────────────
let vpZoom = 1;
let vpPanX = 0;
let vpPanY = 0;
let panning = false, panStartX=0, panStartY=0, panOrigX=0, panOrigY=0;
let spaceDown = false;

// ── Snap to grid ─────────────────────────
let snapOn   = true;
let snapSize = 20;
function snapV(v){ return snapOn ? Math.round(v/snapSize)*snapSize : v; }

// undo / redo stacks  (deep-copy snapshots of shapes[])
let undoStack  = [];
let redoStack  = [];

// lasso state
let lasso      = null; // {x1,y1,x2,y2} while dragging on empty space

// group xform (multi-select handles: gmove | gscale | grotate)
let groupXform = null;

// freehand
let fhDrawing  = false;
let fhCurrent  = [];

// ═══════════════════════════════════════
// HISTORY helpers
// ═══════════════════════════════════════
function snapshot() {
  return JSON.parse(JSON.stringify(shapes));
}
function pushUndo() {
  undoStack.push(snapshot());
  if (undoStack.length > 60) undoStack.shift();
  redoStack = [];
  updateHistoryBtns();
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  shapes = undoStack.pop();
  selectedIds.clear(); lasso=null;groupXform=null;
  redraw(); updateAchs(); updateHistoryBtns();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  shapes = redoStack.pop();
  selectedIds.clear(); lasso=null;groupXform=null;
  redraw(); updateAchs(); updateHistoryBtns();
}
function updateHistoryBtns() {
  const ub = document.getElementById('btn-undo');
  const rb = document.getElementById('btn-redo');
  if (ub) ub.disabled = !undoStack.length;
  if (rb) rb.disabled = !redoStack.length;
}

// ═══════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════
const ACHS = [
  {id:'rect',    icon:'⬛', name:'Usaste um Quadrado',      pts:10, done:false},
  {id:'circle',  icon:'⭕', name:'Usaste um Círculo',       pts:10, done:false},
  {id:'triangle',icon:'🔺', name:'Usaste um Triângulo',     pts:10, done:false},
  {id:'star',    icon:'⭐', name:'Usaste uma Estrela',      pts:15, done:false},
  {id:'heart',   icon:'❤️', name:'Usaste um Coração',       pts:15, done:false},
  {id:'hole',    icon:'⊖',  name:'Fizeste um Orifício',     pts:20, done:false},
  {id:'freehand',icon:'✏️', name:'Desenho Livre',           pts:15, done:false},
  {id:'scale',   icon:'📐', name:'Escalaste uma forma',     pts:10, done:false},
  {id:'rotate',  icon:'🔄', name:'Rodaste uma forma',       pts:10, done:false},
  {id:'multi',   icon:'🖱️', name:'Selecionaste múltiplas',  pts:10, done:false},
  {id:'view3d',  icon:'🔮', name:'Viste em 3D',             pts:25, done:false},
  {id:'stl',     icon:'🖨️', name:'Guardaste para imprimir', pts:30, done:false},
];
let score = 0;

(function buildAchs(){
  const rsb=document.getElementById('rsb');
  ACHS.forEach(a=>{
    const el=document.createElement('div');
    el.className='ach';el.id='ach-'+a.id;
    el.innerHTML=`<div class="ach-icon">${a.icon}</div>
      <div class="ach-body"><div class="ach-name">${a.name}</div>
      <div class="ach-pts">+${a.pts} pts</div></div>
      <div class="ach-check">✅</div>`;
    rsb.appendChild(el);
  });
})();

function unlockAch(id){
  const a=ACHS.find(a=>a.id===id);
  if(!a||a.done)return;
  a.done=true;score+=a.pts;
  document.getElementById('score-val').textContent=score;
  document.getElementById('ach-'+id).classList.add('done');
  showAchPop(a.name, a.icon, a.pts);
}
function showAchPop(msg, icon, pts){
  // popup central
  const pop=document.getElementById('ach-popup');
  if(pop){
    document.getElementById('pop-icon').textContent=icon||'⭐';
    document.getElementById('pop-name').textContent=msg||'Conquista!';
    document.getElementById('pop-pts').textContent=(pts?'+'+pts+' pts':'');
    pop.classList.add('show');
    launchConfetti();
    setTimeout(()=>pop.classList.remove('show'),2800);
  }
}

// ═══════════════════════════════════════
// BUILD BOTTOM BAR
// ═══════════════════════════════════════
(function buildBot(){
  const bot=document.getElementById('bot');

  // colour + height swatches
  COLOR_DEFS.forEach(cd=>{
    const wrap=document.createElement('div');
    wrap.className='col-wrap'+(cd.hex===activeColor?' active':'');
    wrap.dataset.hex=cd.hex;
    wrap.title=cd.hole?cd.name:cd.name+' — duplo clique para editar espessura';

    const sw=document.createElement('div');
    sw.className='col-sw'+(cd.hole?' hole':'');
    if(!cd.hole) sw.style.background=cd.hex;

    const lbl=document.createElement('div');
    lbl.className='col-lbl';
    lbl.textContent=cd.label;

    wrap.appendChild(sw);
    wrap.appendChild(lbl);
    if(!cd.hole) wrap.ondblclick=(ev)=>{ev.stopPropagation();openExtrudePop(cd.hex,wrap);};
    wrap.onclick=()=>{
      document.querySelectorAll('.col-wrap').forEach(x=>x.classList.remove('active'));
      wrap.classList.add('active');
      activeColor=cd.hex;
      // apply to selected shapes
      if(selectedIds.size){
        pushUndo();
        shapes.forEach(s=>{
        if(!selectedIds.has(s.id))return;
        s.color=cd.hex;
        s.zMm=cd.hole?0:cd.z; // actualizar zMm para todos os tipos incluindo freehand
      });
        redraw();
      }
      updateHoleBadge();
    };
    bot.appendChild(wrap);
  });

  // botão "+" para adicionar próxima cor da PICO-8 (máx 8)
  const addColorBtn=document.createElement('button');
  addColorBtn.id='btn-add-color';
  addColorBtn.className='col-wrap';
  addColorBtn.title='Adicionar cor';
  addColorBtn.style.cssText='cursor:pointer;justify-content:center;';
  addColorBtn.innerHTML='<div class="col-sw" style="background:var(--ant-color-fill-secondary);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--ant-color-text-secondary);font-weight:300">+</div><div class="col-lbl">Cor</div>';
  addColorBtn.onclick=()=>{
    const nonHole=COLOR_DEFS.filter(c=>!c.hole);
    if(nonHole.length>=8){addColorBtn.style.opacity='.3';return;}
    // próxima cor da paleta não ainda em uso
    const used=new Set(nonHole.map(c=>c.hex));
    const next=PICO8_PALETTE.find(p=>!used.has(p.hex));
    if(!next) return;
    // inserir antes do furo
    const holeIdx=COLOR_DEFS.findIndex(c=>c.hole);
    COLOR_DEFS.splice(holeIdx,0,{...next});
    // re-render do bot
    rebuildSwatches();
  };
  bot.insertBefore(addColorBtn, bot.querySelector('.bot-sep')||null);

  bot.appendChild(mkSep());

  // select
  bot.appendChild(mkToolBtn('👆','select','Seleccionar / Mover'));
  bot.appendChild(mkToolBtn('🖐️','pan','Mover vista (Pan)'));
  // erase
  const eb=mkToolBtn('🧹','erase','Apagar forma');
  eb.classList.add('danger');bot.appendChild(eb);
  // undo
  const ub=document.createElement('button');
  ub.className='tool-btn';ub.id='btn-undo';ub.textContent='↩️';
  ub.title='Desfazer (Ctrl+Z)';ub.disabled=true;ub.onclick=undo;
  bot.appendChild(ub);
  // redo
  const rb=document.createElement('button');
  rb.className='tool-btn';rb.id='btn-redo';rb.textContent='↪️';
  rb.title='Refazer (Ctrl+Y)';rb.disabled=true;rb.onclick=redo;
  bot.appendChild(rb);

  // limpar stage
  const clr=document.createElement('button');
  clr.className='tool-btn danger';clr.title='Limpar tudo (apagar todas as formas)';
  clr.textContent='🗑️';
  clr.onclick=()=>{
    if(!shapes.length) return;
    if(!confirm('Apagar todas as formas?')) return;
    pushUndo();shapes=[];selectedIds.clear();
    redraw();updateAchs();
  };
  bot.appendChild(clr);

  bot.appendChild(mkSep());

  // STL
  // file input para load
  const fi=document.createElement('input');
  fi.type='file';fi.accept='.json';fi.id='load-input';
  fi.onchange=loadJSON;document.body.appendChild(fi);
})();

const canvas=document.getElementById('canvas2d');
const ctx=canvas.getContext('2d');

function resizeCanvas(){
  // usar getBoundingClientRect para apanhar o tamanho real após reflow CSS
  const r=document.getElementById('stage').getBoundingClientRect();
  canvas.width=Math.round(r.width);canvas.height=Math.round(r.height);redraw();
}
window.addEventListener('resize',resizeCanvas);
setTimeout(resizeCanvas,60);

// shape path — local coords (translate + rotate done outside)
function shapePath(ctx,s){
  const hw=s.w/2,hh=s.h/2;
  ctx.beginPath();
  switch(s.type){
    case 'rect': ctx.rect(-hw,-hh,s.w,s.h);break;
    case 'circle': ctx.ellipse(0,0,hw,hh,0,0,Math.PI*2);break;
    case 'triangle': ctx.moveTo(0,-hh);ctx.lineTo(hw,hh);ctx.lineTo(-hw,hh);ctx.closePath();break;
    case 'star':{
      const spikes=5,outerR=hw,innerR=hw*.42;
      for(let i=0;i<spikes*2;i++){
        const r=i%2===0?outerR:innerR,a=i*Math.PI/spikes-Math.PI/2;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();break;
    }
    case 'heart':
      ctx.moveTo(0,hh*.6);
      ctx.bezierCurveTo(-hw*1.1,-hh*.1,-hw*1.1,-hh,0,-hh*.4);
      ctx.bezierCurveTo(hw*1.1,-hh,hw*1.1,-hh*.1,0,hh*.6);
      ctx.closePath();break;
    case 'hex':
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;
        i===0?ctx.moveTo(Math.cos(a)*hw,Math.sin(a)*hh):ctx.lineTo(Math.cos(a)*hw,Math.sin(a)*hh);}
      ctx.closePath();break;
    case 'arrow':{
      const bw=hw*.55,bh=hh*.45;
      ctx.moveTo(-hw,-bh);ctx.lineTo(0,-bh);ctx.lineTo(0,-hh);
      ctx.lineTo(hw,0);ctx.lineTo(0,hh);ctx.lineTo(0,bh);ctx.lineTo(-hw,bh);
      ctx.closePath();break;
    }
    case 'para':{
      // paralelogramo: topo deslocado hw*0.4 à direita
      const sh=hw*0.45;
      ctx.moveTo(-hw+sh,-hh);ctx.lineTo(hw+sh,-hh);
      ctx.lineTo(hw-sh,hh);ctx.lineTo(-hw-sh,hh);
      ctx.closePath();break;
    }
    case 'trap':{
      const tw=hw*0.55;
      ctx.moveTo(-tw,-hh);ctx.lineTo(tw,-hh);
      ctx.lineTo(hw,hh);ctx.lineTo(-hw,hh);
      ctx.closePath();break;
    }
    case 'diamond':{
      ctx.moveTo(0,-hh);ctx.lineTo(hw,0);
      ctx.lineTo(0,hh);ctx.lineTo(-hw,0);
      ctx.closePath();break;
    }
    case 'freehand':
      if(!s.fhPoints||s.fhPoints.length<2)break;
      ctx.moveTo(s.fhPoints[0].x,s.fhPoints[0].y);
      for(let i=1;i<s.fhPoints.length;i++) ctx.lineTo(s.fhPoints[i].x,s.fhPoints[i].y);
      ctx.closePath();break;
  }
}

function colorLabel(s){
  if(s.color===HOLE_COLOR) return null;
  const cd=COLOR_DEFS.find(c=>c.hex===s.color);
  return cd?cd.label:null;
}

function redraw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ── grelha (screen space, sem vp transform) ─────────────────────
  if(mode==='2d'){
    if(snapOn){
      const gs=Math.max(4, snapSize*vpZoom);
      const ox=((vpPanX%gs)+gs)%gs, oy=((vpPanY%gs)+gs)%gs;
      ctx.fillStyle='rgba(255,255,255,0.055)';
      for(let gx=ox-gs;gx<canvas.width+gs;gx+=gs)
        for(let gy=oy-gs;gy<canvas.height+gs;gy+=gs)
          ctx.fillRect(gx-1,gy-1,2,2);
    } else {
      ctx.fillStyle='rgba(255,255,255,0.03)';
      for(let x=24;x<canvas.width;x+=32)
        for(let y=24;y<canvas.height;y+=32)
          ctx.fillRect(x-1,y-1,2,2);
    }
  }

  // ── aplicar viewport (zoom + pan) ───────────────────────────────
  ctx.save();
  ctx.translate(vpPanX, vpPanY);
  ctx.scale(vpZoom, vpZoom);

  // ── desenhar shapes ─────────────────────────────────────────────
  shapes.forEach(s=>{
    if(s.hidden) return; // layer invisível
    const isHole=s.color===HOLE_COLOR;
    const isSel=selectedIds.has(s.id);
    ctx.save();
    if(s.type!=='freehand'){ctx.translate(s.x,s.y);ctx.rotate(s.rot);}
    shapePath(ctx,s);
    ctx.fillStyle=isHole?'rgba(0,0,0,.6)':s.color+'cc';
    ctx.strokeStyle=isSel?'#fff':(isHole?'#ff4444':s.color);
    ctx.lineWidth=isSel?3:1.5;
    if(isHole)ctx.setLineDash([4,3]);
    ctx.fill();ctx.stroke();
    ctx.setLineDash([]);
    if(isHole&&s.type!=='freehand'){
      ctx.fillStyle='#ff4444';ctx.font='bold 12px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⊖',0,0);
    }
    if(!isHole&&s.type!=='freehand'){
      const lbl=colorLabel(s);
      if(lbl){
        ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(-18,-7,36,14);
        ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,0,0);
      }
    }
    ctx.restore();
    if(isSel&&selectedIds.size===1) drawHandles(s);
  });

  // ── freehand in-progress ─────────────────────────────────────────
  if(fhDrawing&&fhCurrent.length>1){
    ctx.beginPath();
    ctx.moveTo(fhCurrent[0].x,fhCurrent[0].y);
    for(let i=1;i<fhCurrent.length;i++) ctx.lineTo(fhCurrent[i].x,fhCurrent[i].y);
    ctx.strokeStyle=activeColor===HOLE_COLOR?'#ff4444':activeColor;
    ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
    if(activeColor===HOLE_COLOR)ctx.setLineDash([4,3]);
    ctx.stroke();ctx.setLineDash([]);
  }

  ctx.restore(); // fim viewport transform

  // group handles for multi-select (em screen space — sem vp transform)
  if(selectedIds.size>1){
    const sel=shapes.filter(s=>selectedIds.has(s.id));
    if(sel.length>0){
      let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
      sel.forEach(s=>{
        if(s.type==='freehand'){
          // freehand: use raw fhPoints bounds
          if(s.fhPoints) s.fhPoints.forEach(p=>{
            minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);
            maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);
          });
          return;
        }
        const hw=s.w/2,hh=s.h/2;
        [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].forEach(([lx,ly])=>{
          const cos=Math.cos(s.rot),sin=Math.sin(s.rot);
          const wx=s.x+lx*cos-ly*sin,wy=s.y+lx*sin+ly*cos;
          minX=Math.min(minX,wx);minY=Math.min(minY,wy);
          maxX=Math.max(maxX,wx);maxY=Math.max(maxY,wy);
        });
      });
      const pad=22;
      const bx=minX-pad,by=minY-pad,bw=maxX-minX+pad*2,bh=maxY-minY+pad*2;
      const cx=bx+bw/2,cy=by+bh/2;
      ctx.save();
      ctx.translate(vpPanX,vpPanY); ctx.scale(vpZoom,vpZoom);
      ctx.textAlign='center';ctx.textBaseline='middle';
      const z=vpZoom;
      const gOff=32/z; // offset dos handles em world coords
      const gR=15/z;   // raio em world coords
      // helper inline para group handles
      function gh(hx,hy,fill,emoji,font){
        ctx.beginPath();ctx.arc(hx,hy,gR,0,Math.PI*2);
        ctx.fillStyle=fill;ctx.strokeStyle='#fff';ctx.lineWidth=2/z;
        ctx.fill();ctx.stroke();
        ctx.fillStyle='#fff';ctx.font=font||`${16/z}px sans-serif`;
        ctx.fillText(emoji,hx,hy);
      }
      // bounding box
      ctx.strokeStyle='#4d96ff';ctx.lineWidth=2/z;ctx.setLineDash([6/z,4/z]);
      ctx.strokeRect(bx,by,bw,bh);ctx.setLineDash([]);
      const cmy=by+bh/2; // centro vertical do bbox
      // topo esq: rotate 45° (roxo)
      ctx.beginPath();ctx.moveTo(cx-bw*0.2,by);ctx.lineTo(cx-bw*0.2,by-gOff*0.65);
      ctx.strokeStyle='#ffffff66';ctx.lineWidth=1.5/z;ctx.stroke();
      gh(cx-bw*0.2, by-gOff,'#a259ff','↺');
      // topo dir: rotate livre (índigo)
      ctx.beginPath();ctx.moveTo(cx+bw*0.2,by);ctx.lineTo(cx+bw*0.2,by-gOff*0.65);
      ctx.strokeStyle='#ffffff66';ctx.lineWidth=1.5/z;ctx.stroke();
      gh(cx+bw*0.2, by-gOff,'#6366f1','🔄',`${13/z}px sans-serif`);
      // 4 cantos: scale (branco/azul) — igual às shapes individuais
      [[bx,by],[bx+bw,by],[bx+bw,by+bh],[bx,by+bh]].forEach(([hx,hy])=>{
        ctx.beginPath();ctx.arc(hx,hy,12/z,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.strokeStyle='#4d96ff';ctx.lineWidth=3/z;
        ctx.fill();ctx.stroke();
      });
      // baixo: deform (verde)
      ctx.beginPath();ctx.moveTo(cx,by+bh);ctx.lineTo(cx,by+bh+gOff*0.65);
      ctx.strokeStyle='#ffffff66';ctx.lineWidth=1.5/z;ctx.stroke();
      gh(cx, by+bh+gOff,'#4ecb71','⤡',`bold ${16/z}px sans-serif`);
      // esquerda: eliminar (vermelho)
      ctx.beginPath();ctx.moveTo(bx,cmy);ctx.lineTo(bx-gOff*0.65,cmy);
      ctx.strokeStyle='#ffffff66';ctx.lineWidth=1.5/z;ctx.stroke();
      gh(bx-gOff, cmy,'#ff4d4f','🗑️',`${14/z}px sans-serif`);
      // direita: duplicar (laranja)
      ctx.beginPath();ctx.moveTo(bx+bw,cmy);ctx.lineTo(bx+bw+gOff*0.65,cmy);
      ctx.strokeStyle='#ffffff66';ctx.lineWidth=1.5/z;ctx.stroke();
      gh(bx+bw+gOff, cmy,'#fa8c16','⧉',`bold ${16/z}px sans-serif`);
      ctx.restore();
      // store bounding info for hit testing
      window._grpBounds={bx,by,bw,bh,cx,cy};
    }
  } else { window._grpBounds=null; }

  // lasso rectangle
  if(lasso){
    // lasso em world coords → converter para screen
    const lx1=lasso.x1*vpZoom+vpPanX, ly1=lasso.y1*vpZoom+vpPanY;
    const lx2=lasso.x2*vpZoom+vpPanX, ly2=lasso.y2*vpZoom+vpPanY;
    ctx.strokeStyle='#4d96ff';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.strokeRect(Math.min(lx1,lx2),Math.min(ly1,ly2),Math.abs(lx2-lx1),Math.abs(ly2-ly1));
    ctx.fillStyle='rgba(77,150,255,.08)';
    ctx.fillRect(Math.min(lx1,lx2),Math.min(ly1,ly2),Math.abs(lx2-lx1),Math.abs(ly2-ly1));
    ctx.setLineDash([]);
  }

  // UI state
  const has=shapes.length>0;
  document.getElementById('hint2d').style.opacity=has?'0':'0.15';
  const _s=document.getElementById('hdr-stl');if(_s)_s.style.opacity=has?'1':'.45';
  const _b3=document.getElementById('btn-3d-float');if(_b3)_b3.style.opacity=has?'1':'.4';
  // actualizar layers se painel aberto
  if(typeof layersOpen!=='undefined'&&layersOpen&&typeof renderLayers==='function') renderLayers();
}

function drawHandle(x,y,r,fill,emoji,font){
  const z=vpZoom;
  ctx.beginPath();ctx.arc(x,y,r/z,0,Math.PI*2);
  ctx.fillStyle=fill;ctx.strokeStyle='#fff';ctx.lineWidth=2.5/z;
  ctx.fill();ctx.stroke();
  if(emoji){ctx.fillStyle='#fff';ctx.font=font||`${(r*1.2)/z}px sans-serif`;ctx.fillText(emoji,x,y);}
}
function drawHandles(s){
  if(s.type==='freehand') syncFhMeta(s);
  const isFh=s.type==='freehand';
  const hw=s.w/2+10, hh=s.h/2+10;
  const z=vpZoom;
  const off=32/z;
  ctx.save();
  ctx.translate(s.x,s.y);
  if(!isFh) ctx.rotate(s.rot);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  // bbox dashed
  ctx.setLineDash([5/z,4/z]);ctx.strokeStyle='#ffffff66';ctx.lineWidth=1.5/z;
  ctx.strokeRect(-hw,-hh,hw*2,hh*2);ctx.setLineDash([]);
  if(!isFh){
    // 4 cantos: scale (branco/azul) — só formas normais
    [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([cx,cy])=>{
      ctx.beginPath();ctx.arc(cx*hw,cy*hh,12/z,0,Math.PI*2);
      ctx.fillStyle='#fff';ctx.strokeStyle='#4d96ff';ctx.lineWidth=3/z;
      ctx.fill();ctx.stroke();
    });
    // baixo: deform (verde) — só formas normais
    ctx.beginPath();ctx.moveTo(0,hh);ctx.lineTo(0,hh+off*0.65);
    ctx.strokeStyle='#ffffff66';ctx.lineWidth=2/z;ctx.stroke();
    drawHandle(0,hh+off,15,'#4ecb71','⤡',`bold ${18/z}px sans-serif`);
  }
  // esquerda: eliminar (vermelho) — todas as formas
  ctx.beginPath();ctx.moveTo(-hw,0);ctx.lineTo(-hw-off*0.65,0);
  ctx.strokeStyle='#ffffff66';ctx.lineWidth=2/z;ctx.stroke();
  drawHandle(-hw-off,0,15,'#ff4d4f','🗑️',`${15/z}px sans-serif`);
  // direita: duplicar (laranja) — todas as formas
  ctx.beginPath();ctx.moveTo(hw,0);ctx.lineTo(hw+off*0.65,0);
  ctx.strokeStyle='#ffffff66';ctx.lineWidth=2/z;ctx.stroke();
  drawHandle(hw+off,0,15,'#fa8c16','⧉',`bold ${18/z}px sans-serif`);
  // topo esq: rotate 45° (roxo)
  ctx.beginPath();ctx.moveTo(-hw*0.35,-hh);ctx.lineTo(-hw*0.35,-hh-off*0.65);
  ctx.strokeStyle='#ffffff66';ctx.lineWidth=2/z;ctx.stroke();
  drawHandle(-hw*0.35,-hh-off,15,'#a259ff','↺',`${18/z}px sans-serif`);
  // topo dir: rotate livre (índigo)
  ctx.beginPath();ctx.moveTo(hw*0.35,-hh);ctx.lineTo(hw*0.35,-hh-off*0.65);
  ctx.strokeStyle='#ffffff66';ctx.lineWidth=2/z;ctx.stroke();
  drawHandle(hw*0.35,-hh-off,15,'#6366f1','🔄',`${14/z}px sans-serif`);
  ctx.restore();
}

// ── freehand bbox helpers ────────────────────────
function fhBBox(s){
  if(!s.fhPoints||!s.fhPoints.length) return{x:s.x||0,y:s.y||0,w:s.w||40,h:s.h||40};
  const xs=s.fhPoints.map(p=>p.x),ys=s.fhPoints.map(p=>p.y);
  const x0=Math.min(...xs),y0=Math.min(...ys),x1=Math.max(...xs),y1=Math.max(...ys);
  return{x:(x0+x1)/2,y:(y0+y1)/2,w:Math.max(x1-x0,10),h:Math.max(y1-y0,10)};
}
function syncFhMeta(s){
  if(s.type!=='freehand'||!s.fhPoints)return;
  const b=fhBBox(s);s.x=b.x;s.y=b.y;s.w=b.w;s.h=b.h;
}

// ── hit testing ──────────────────────────────────
function ptInShape(s,px,py){
  if(s.hidden) return false; // layer invisível
  if(s.type==='freehand'){
    if(!s.fhPoints||!s.fhPoints.length)return false;
    const xs=s.fhPoints.map(p=>p.x),ys=s.fhPoints.map(p=>p.y);
    return px>=Math.min(...xs)-10&&px<=Math.max(...xs)+10&&
           py>=Math.min(...ys)-10&&py<=Math.max(...ys)+10;
  }
  const dx=px-s.x,dy=py-s.y;
  const cos=Math.cos(-s.rot),sin=Math.sin(-s.rot);
  const lx=dx*cos-dy*sin,ly=dx*sin+dy*cos;
  return Math.abs(lx)<=s.w/2+8&&Math.abs(ly)<=s.h/2+8;
}

function getHandleAt(s,px,py){
  if(!s) return null;
  if(s.type==='freehand') syncFhMeta(s);
  const hw=s.w/2+10, hh=s.h/2+10;
  const dx=px-s.x, dy=py-s.y;
  const rot=s.type==='freehand'?0:s.rot;
  const cos=Math.cos(-rot), sin=Math.sin(-rot);
  const lx=dx*cos-dy*sin, ly=dx*sin+dy*cos;
  // off = mesmo valor do drawHandles (off=32/z onde z=vpZoom)
  const off=32/vpZoom;
  const hr=20/vpZoom; // hit radius generoso
  // topo esq: rotate 45° — handle em (-hw*0.35, -hh-off)
  if(Math.hypot(lx+hw*0.35, ly+hh+off)<hr) return 'rotate';
  // topo dir: rotate livre — handle em (hw*0.35, -hh-off)
  if(Math.hypot(lx-hw*0.35, ly+hh+off)<hr) return 'rotate2';
  if(s.type!=='freehand'){
    // baixo: deform — só formas normais
    if(Math.hypot(lx, ly-hh-off)<hr) return 'deform';
    // cantos: scale — só formas normais
    for(const [cx,cy] of [[-1,-1],[1,-1],[1,1],[-1,1]])
      if(Math.hypot(lx-cx*hw, ly-cy*hh)<hr) return 'scale';
  }
  // esquerda: eliminar — todas as formas
  if(Math.hypot(lx+hw+off, ly)<hr) return 'delete-h';
  // direita: duplicar — todas as formas
  if(Math.hypot(lx-hw-off, ly)<hr) return 'duplicate-h';
  return null;
}

// shapes in lasso rect
function shapesInLasso(x1,y1,x2,y2){
  const rx=Math.min(x1,x2),ry=Math.min(y1,y2),rw=Math.abs(x2-x1),rh=Math.abs(y2-y1);
  return shapes.filter(s=>{
    const cx=s.type==='freehand'?(s.fhPoints?s.fhPoints.reduce((a,p)=>a+p.x,0)/s.fhPoints.length:0):s.x;
    const cy=s.type==='freehand'?(s.fhPoints?s.fhPoints.reduce((a,p)=>a+p.y,0)/s.fhPoints.length:0):s.y;
    return cx>=rx&&cx<=rx+rw&&cy>=ry&&cy<=ry+rh;
  });
}

function canvasXY(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  const sx=src.clientX-r.left, sy=src.clientY-r.top;
  // converter screen → world (inverter pan + zoom)
  return{x:(sx-vpPanX)/vpZoom, y:(sy-vpPanY)/vpZoom};
}
// screen coords sem inverter vp (para handles que são em screen space)
function screenXY(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}

canvas.addEventListener('pointerdown',onDown,{passive:false});
canvas.addEventListener('pointermove',onMove,{passive:false});

// ── Zoom com scroll ──────────────────────────────────────────────
canvas.addEventListener('wheel', e=>{
  if(mode!=='2d'){e.preventDefault();return;}
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top; // screen pivot
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  const newZoom = Math.max(0.1, Math.min(10, vpZoom*factor));
  // ajustar pan para que o ponto sob o cursor fique fixo
  vpPanX = mx - (mx-vpPanX) * (newZoom/vpZoom);
  vpPanY = my - (my-vpPanY) * (newZoom/vpZoom);
  vpZoom = newZoom;
  const _zpct=Math.round(vpZoom*100)+'%';
  const _zv=document.getElementById('vpz-val'); if(_zv)_zv.textContent=_zpct;
  const _zv2=document.getElementById('zoom-val'); if(_zv2)_zv2.textContent=_zpct;
  // régua de escala
  const _rb=document.getElementById('ruler-bar');
  if(_rb && canvas.height){ _rb.style.width=Math.round(10*(canvas.height/200)*vpZoom)+'px'; }
  redraw();
},{passive:false});

window.addEventListener('keyup',   e=>{ if(e.code==='Space'){spaceDown=false;canvas.style.cursor=activeTool==='erase'?'crosshair':'default';}});

canvas.addEventListener('pointerdown', e=>{

    e.preventDefault();

    panOrigX=vpPanX; panOrigY=vpPanY;

// pan move integrado no onMove

['pointerup','pointerleave'].forEach(ev=>canvas.addEventListener(ev, e=>{

}));

function onDown(e){
  if(mode!=='2d')return;
  // PAN — tratado pelo listener separado, não interferir
  if(activeTool==='pan') return;
  e.preventDefault();
  const{x,y}=canvasXY(e);

  // FREEHAND
  if(activeTool==='freehand'){
    fhDrawing=true;fhCurrent=[{x,y}];
    canvas.setPointerCapture(e.pointerId);return;
  }

  // ERASE
  if(activeTool==='erase'){
    for(let i=shapes.length-1;i>=0;i--){
      if(ptInShape(shapes[i],x,y)){
        pushUndo();shapes.splice(i,1);
        selectedIds.clear();redraw();updateAchs();return;
      }
    }
    return;
  }

  // DUPLICATE
  if(activeTool==='duplicate'){
    for(let i=shapes.length-1;i>=0;i--){
      if(ptInShape(shapes[i],x,y)){
        pushUndo();
        const src=shapes[i];
        const clone=JSON.parse(JSON.stringify(src));
        clone.id=nextId++;
        // offset: 24px right + 24px down in canvas space
        const offset=Math.max(24, Math.min(src.w||40, src.h||40)*0.35);
        if(clone.type==='freehand'&&clone.fhPoints){
          clone.fhPoints=clone.fhPoints.map(p=>({x:p.x+offset,y:p.y+offset}));
        } else {
          clone.x+=offset; clone.y+=offset;
        }
        shapes.push(clone);
        selectedIds=new Set([clone.id]);
        redraw();updateAchs();return;
      }
    }
    return;
  }

  // SELECT
  // 0. group handles (multi-select)
  if(selectedIds.size>1 && window._grpBounds){
    const {bx,by,bw,bh,cx,cy}=window._grpBounds;
    const cmy=by+bh/2;
    const gOff=32/vpZoom;
    const gHr=20/vpZoom; // hit radius
    // topo esq: rotate 45° em torno do centro do grupo
    if(Math.hypot(x-(cx-bw*0.2), y-(by-gOff))<gHr){
      pushUndo();
      const STEP=Math.PI/4;
      const rc=Math.cos(STEP),rs=Math.sin(STEP);
      shapes.forEach(s=>{
        if(!selectedIds.has(s.id))return;
        if(s.type==='freehand'&&s.fhPoints){
          s.fhPoints=s.fhPoints.map(p=>({
            x:cx+(p.x-cx)*rc-(p.y-cy)*rs,
            y:cy+(p.x-cx)*rs+(p.y-cy)*rc,
          }));syncFhMeta(s);
        } else {
          s.rot=(s.rot||0)+STEP;
          const dx2=s.x-cx,dy2=s.y-cy;
          s.x=cx+dx2*rc-dy2*rs;
          s.y=cy+dx2*rs+dy2*rc;
        }
      });
      unlockAch('rotate');redraw();return;
    }
    // topo dir: rotate livre
    if(Math.hypot(x-(cx+bw*0.2), y-(by-gOff))<gHr){
      pushUndo();
      const initAngle=Math.atan2(y-cy,x-cx);
      groupXform={dragMode:'grotate',startX:x,startY:y,cx,cy,initAngle,origShapes:snapshot()};
      canvas.setPointerCapture(e.pointerId);return;
    }
    // baixo: deform
    if(Math.hypot(x-cx, y-(by+bh+gOff))<gHr){
      pushUndo();
      groupXform={dragMode:'gdeform',startX:x,startY:y,cx,cy,origShapes:snapshot()};
      canvas.setPointerCapture(e.pointerId);return;
    }
    // esquerda: eliminar todas
    if(Math.hypot(x-(bx-gOff), y-cmy)<gHr){
      pushUndo();
      shapes=shapes.filter(s=>!selectedIds.has(s.id));
      selectedIds.clear();redraw();updateAchs();return;
    }
    // direita: duplicar todas
    if(Math.hypot(x-(bx+bw+gOff), y-cmy)<gHr){
      pushUndo();
      const newIds=new Set();
      const off2=24;
      [...selectedIds].forEach(id=>{
        const src=shapes.find(s=>s.id===id);
        if(!src)return;
        const clone=JSON.parse(JSON.stringify(src));
        clone.id=nextId++;
        if(clone.type==='freehand'&&clone.fhPoints)
          clone.fhPoints=clone.fhPoints.map(p=>({x:p.x+off2,y:p.y+off2}));
        else{clone.x+=off2;clone.y+=off2;}
        shapes.push(clone);newIds.add(clone.id);
      });
      selectedIds=newIds;redraw();updateAchs();return;
    }
    // cantos: scale do grupo
    for(const [hx,hy] of [[bx,by],[bx+bw,by],[bx+bw,by+bh],[bx,by+bh]]){
      if(Math.hypot(x-hx,y-hy)<gHr){
        pushUndo();
        const initDist=Math.hypot(x-cx,y-cy);
        groupXform={dragMode:'gscale',startX:x,startY:y,cx,cy,initDist,origShapes:snapshot()};
        canvas.setPointerCapture(e.pointerId);return;
      }
    }
    // inside bbox = gmove
    if(x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh){
      pushUndo();
      groupXform={dragMode:'gmove',startX:x,startY:y,cx,cy,origShapes:snapshot()};
      canvas.setPointerCapture(e.pointerId);return;
    }
  }

  // 1. check handle on a single-selected shape
  if(selectedIds.size===1){
    const sel=shapes.find(s=>s.id===[...selectedIds][0]);
    if(sel){
      const h=getHandleAt(sel,x,y);
      if(h){
        if(h==='rotate'){
          // ↺ clique → 45° fixos
          pushUndo();
          const STEP=Math.PI/4;
          if(sel.type==='freehand'&&sel.fhPoints){
            syncFhMeta(sel);
            const rcx=sel.x,rcy=sel.y;
            const rc=Math.cos(STEP),rs=Math.sin(STEP);
            sel.fhPoints=sel.fhPoints.map(p=>({
              x:rcx+(p.x-rcx)*rc-(p.y-rcy)*rs,
              y:rcy+(p.x-rcx)*rs+(p.y-rcy)*rc,
            }));
            syncFhMeta(sel);
          } else { sel.rot=(sel.rot||0)+STEP; }
          unlockAch('rotate'); redraw(); return;
        }
        if(h==='rotate2'){
          // 🔄 drag livre
          pushUndo();
          drag={mode:'rotate',startX:x,startY:y,origShapes:snapshot()};
          canvas.setPointerCapture(e.pointerId); return;
        }
        if(h==='delete-h'){
          pushUndo();
          shapes=shapes.filter(sh=>sh.id!==sel.id);
          selectedIds.clear(); redraw(); updateAchs(); return;
        }
        if(h==='duplicate-h'){
          pushUndo();
          const clone=JSON.parse(JSON.stringify(sel));
          clone.id=nextId++;
          const off2=24;
          if(clone.type==='freehand'&&clone.fhPoints)
            clone.fhPoints=clone.fhPoints.map(p=>({x:p.x+off2,y:p.y+off2}));
          else { clone.x+=off2; clone.y+=off2; }
          shapes.push(clone);
          selectedIds=new Set([clone.id]);
          redraw(); updateAchs(); return;
        }
        pushUndo();
        drag={mode:h,startX:x,startY:y,origShapes:snapshot()};
        canvas.setPointerCapture(e.pointerId); return;
      }
    }
  }

  // 2. click on a shape?
  let hit=null;
  for(let i=shapes.length-1;i>=0;i--){
    if(ptInShape(shapes[i],x,y)){hit=shapes[i];break;}
  }

  if(hit){
    if(e.shiftKey){
      // shift+click: toggle shape in/out of selection
      if(selectedIds.has(hit.id)) selectedIds.delete(hit.id);
      else selectedIds.add(hit.id);
      redraw();return;
    }
    if(!selectedIds.has(hit.id)){
      // plain click: replace selection
      selectedIds=new Set([hit.id]);
    }
    pushUndo();
    drag={mode:'move',startX:x,startY:y,origShapes:snapshot()};
    canvas.setPointerCapture(e.pointerId);
    redraw();return;
  }

  // 3. empty space → start lasso
  selectedIds.clear();
  lasso={x1:x,y1:y,x2:x,y2:y};
  canvas.setPointerCapture(e.pointerId);
  redraw();
}

function onMove(e){
  if(mode!=='2d')return;
  e.preventDefault();

  // PAN em tempo real — tratar aqui antes de qualquer outra coisa
  if(panning){
    vpPanX=panOrigX+(e.clientX-panStartX);
    vpPanY=panOrigY+(e.clientY-panStartY);
    const _pct=Math.round(vpZoom*100)+'%';
    const _zv=document.getElementById('vpz-val');if(_zv)_zv.textContent=_pct;
    const _rb=document.getElementById('ruler-bar');
    if(_rb&&canvas.height)_rb.style.width=Math.round(10*(canvas.height/200)*vpZoom)+'px';
    redraw();return;
  }

  const{x,y}=canvasXY(e);

  // freehand cursor
  const cur=document.getElementById('fh-cursor');
  if(activeTool==='freehand'){
    const sc=screenXY(e); // screen coords para posicionar o cursor CSS
    cur.style.display='block';cur.style.left=sc.x+'px';cur.style.top=sc.y+'px';
    cur.style.width=cur.style.height='20px';
    if(fhDrawing){fhCurrent.push({x,y});redraw();} // x,y são world coords
    return;
  }
  cur.style.display='none';

  // group xform
  if(groupXform){
    const {dragMode,cx,cy,origShapes}=groupXform;
    const selList=shapes.filter(s=>selectedIds.has(s.id));
    if(dragMode==='gmove'){
      const dx=x-groupXform.startX,dy=y-groupXform.startY;
      selList.forEach(s=>{
        const o=origShapes.find(o=>o.id===s.id);
        if(!o)return;
        if(s.type==='freehand'&&o.fhPoints){
          s.fhPoints=o.fhPoints.map(p=>({x:p.x+dx,y:p.y+dy}));
        } else {
          s.x=o.x+dx;s.y=o.y+dy;
        }
      });
    } else if(dragMode==='gscale'){
      const dist=Math.hypot(x-cx,y-cy);
      const ratio=Math.max(0.1,dist/(groupXform.initDist||1));
      selList.forEach(s=>{
        const o=origShapes.find(o=>o.id===s.id);
        if(!o)return;
        if(s.type==='freehand'&&o.fhPoints){
          s.fhPoints=o.fhPoints.map(p=>({x:cx+(p.x-cx)*ratio,y:cy+(p.y-cy)*ratio}));
        } else {
          s.w=Math.max(10,o.w*ratio);s.h=Math.max(10,o.h*ratio);
          s.x=cx+(o.x-cx)*ratio;s.y=cy+(o.y-cy)*ratio;
        }
      });
      unlockAch('scale');
    } else if(dragMode==='grotate'){
      const angle=Math.atan2(y-cy,x-cx);
      const delta=angle-groupXform.initAngle;
      const cosd=Math.cos(delta),sind=Math.sin(delta);
      selList.forEach(s=>{
        const o=origShapes.find(o=>o.id===s.id);
        if(!o)return;
        if(s.type==='freehand'&&o.fhPoints){
          s.fhPoints=o.fhPoints.map(p=>{
            const pdx=p.x-cx,pdy=p.y-cy;
            return{x:cx+pdx*cosd-pdy*sind,y:cy+pdx*sind+pdy*cosd};
          });
        } else {
          s.rot=(o.rot||0)+delta;
          const dx=o.x-cx,dy=o.y-cy;
          s.x=cx+dx*cosd-dy*sind;s.y=cy+dx*sind+dy*cosd;
        }
      });
      unlockAch('rotate');
    } else if(dragMode==='gdeform'){
      // deformar em torno do centro do grupo
      const dx2=x-groupXform.startX, dy2=y-groupXform.startY;
      const {bw,bh}=window._grpBounds||{bw:200,bh:200};
      const rw=Math.max(0.1, 1 + dx2/(bw||200));
      const rh=Math.max(0.1, 1 + dy2/(bh||200));
      selList.forEach(s=>{
        const o=origShapes.find(o=>o.id===s.id);
        if(!o)return;
        if(s.type==='freehand'&&o.fhPoints){
          s.fhPoints=o.fhPoints.map(p=>({
            x:cx+(p.x-cx)*rw,
            y:cy+(p.y-cy)*rh,
          }));syncFhMeta(s);
        } else {
          s.w=Math.max(10,o.w*rw);
          s.h=Math.max(10,o.h*rh);
          s.x=cx+(o.x-cx)*rw;
          s.y=cy+(o.y-cy)*rh;
        }
      });
      unlockAch('scale');
    }
    redraw();return;
  }

  // lasso update
  if(lasso){
    lasso.x2=x;lasso.y2=y;
    // live highlight
    const inside=shapesInLasso(lasso.x1,lasso.y1,x,y);
    selectedIds=new Set(inside.map(s=>s.id));
    redraw();return;
  }

  // drag shapes or handle
  if(!drag)return;
  const dx=x-drag.startX,dy=y-drag.startY;
  const orig=drag.origShapes;

  if(drag.mode==='move'){
    selectedIds.forEach(id=>{
      const s=shapes.find(s=>s.id===id);
      const o=orig.find(o=>o.id===id);
      if(!s||!o)return;
      if(s.type==='freehand'&&o.fhPoints){
        // snap: arredondar o offset total
        const sdx=snapV(o.x+dx)-o.x, sdy=snapV(o.y+dy)-o.y;
        s.fhPoints=o.fhPoints.map(p=>({x:p.x+sdx,y:p.y+sdy}));
        syncFhMeta(s);
      } else {
        s.x=snapV(o.x+dx); s.y=snapV(o.y+dy);
      }
    });
  } else {
    // scale/rotate only for single selection
    const id=[...selectedIds][0];
    const s=shapes.find(s=>s.id===id);
    const o=orig.find(o=>o.id===id);
    if(!s||!o)return;
    if(drag.mode==='scale'){
      const dist=Math.hypot(x-s.x,y-s.y);
      const base=Math.hypot(drag.startX-o.x,drag.startY-o.y);
      const ratio=Math.max(.2,dist/(base||1));
      s.w=Math.max(20,o.w*ratio);s.h=Math.max(20,o.h*ratio);
      unlockAch('scale');
    } else if(drag.mode==='deform'){
      // deform: X drag → width, Y drag → height, independent
      const cos=Math.cos(-s.rot),sin=Math.sin(-s.rot);
      const rdx=dx*cos-dy*sin, rdy=dx*sin+dy*cos;
      s.w=Math.max(20,o.w+rdx*2);
      s.h=Math.max(20,o.h+rdy*2);
      unlockAch('scale');
    } else if(drag.mode==='rotate'){
      // drag livre de rotate (shift+rotate)
      if(s.type==='freehand'&&o.fhPoints){
        const angle=Math.atan2(y-o.y,x-o.x)+Math.PI/2;
        const initAngle=Math.atan2(drag.startY-o.y,drag.startX-o.x)+Math.PI/2;
        const delta=angle-initAngle;
        const cos=Math.cos(delta),sin=Math.sin(delta);
        s.fhPoints=o.fhPoints.map(p=>({
          x:o.x+(p.x-o.x)*cos-(p.y-o.y)*sin,
          y:o.y+(p.x-o.x)*sin+(p.y-o.y)*cos,
        }));
        syncFhMeta(s);
      } else {
        s.rot=Math.atan2(y-s.y,x-s.x)+Math.PI/2;
      }
      unlockAch('rotate');
    }
  }
  redraw();
}

function onUp(e){
  // finish lasso
  if(lasso){
    const inside=shapesInLasso(lasso.x1,lasso.y1,lasso.x2,lasso.y2);
    selectedIds=new Set(inside.map(s=>s.id));
    if(selectedIds.size>1) unlockAch('multi');
    lasso=null;redraw();
    try{if(e)canvas.releasePointerCapture(e.pointerId);}catch(_){}
    return;
  }
  // finish freehand
  if(fhDrawing&&fhCurrent.length>4){
    pushUndo();
    const simplified=rdp(smooth(fhCurrent,3),1.2);
    const cd=COLOR_DEFS.find(c=>c.hex===activeColor)||COLOR_DEFS[0];
    shapes.push({
      id:nextId++,type:'freehand',
      x:0,y:0,w:0,h:0,rot:0,
      color:activeColor,
      fhPoints:simplified,
      zMm:(COLOR_DEFS.find(cd=>cd.hex===activeColor)||{z:Z_FREEHAND}).z||Z_FREEHAND,
    });
    selectedIds.clear();
    unlockAch('freehand');
    if(activeColor===HOLE_COLOR)unlockAch('hole');
    updateAchs();
  }
  fhDrawing=false;fhCurrent=[];
  drag=null;
  groupXform=null;
  try{if(e)canvas.releasePointerCapture(e.pointerId);}catch(_){}
  redraw();
}

// ── Smooth + RDP ─────────────────────────────────
// smooth: média móvel com janela w (preserva primeiro e último ponto)
function smooth(pts, w){
  if(pts.length<=2) return pts;
  return pts.map((p,i)=>{
    const lo=Math.max(0,i-w), hi=Math.min(pts.length-1,i+w);
    let sx=0,sy=0,n=0;
    for(let j=lo;j<=hi;j++){sx+=pts[j].x;sy+=pts[j].y;n++;}
    return{x:sx/n,y:sy/n};
  });
}
function perp(pt,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l=dx*dx+dy*dy;
  if(!l)return Math.hypot(pt.x-a.x,pt.y-a.y);
  const t=Math.max(0,Math.min(1,((pt.x-a.x)*dx+(pt.y-a.y)*dy)/l));
  return Math.hypot(pt.x-(a.x+t*dx),pt.y-(a.y+t*dy));
}
function rdp(pts,eps){
  if(pts.length<=2)return pts;
  let maxD=0,idx=0;
  for(let i=1;i<pts.length-1;i++){const d=perp(pts[i],pts[0],pts[pts.length-1]);if(d>maxD){maxD=d;idx=i;}}
  if(maxD>eps){const l=rdp(pts.slice(0,idx+1),eps),r=rdp(pts.slice(idx),eps);return[...l.slice(0,-1),...r];}
  return[pts[0],pts[pts.length-1]];
}

function setMode(m){
  mode=m;
  canvas.style.display                               =m==='2d'?'block':'none';
  document.getElementById('hint2d').style.display   =m==='2d'?'flex':'none';
  document.getElementById('three-mount').style.display=m==='3d'?'block':'none';
  document.getElementById('fh-cursor').style.display='none';
  document.getElementById('hole-badge').style.display='none';
  // botão flutuante: 3D/VER ↔ ✏️/EDITAR
  const btn3d=document.getElementById('btn-3d-float');
  if(btn3d){

    wrap.onclick=()=>{
      document.querySelectorAll('.col-wrap').forEach(x=>x.classList.remove('active'));
      wrap.classList.add('active');
      activeColor=cd.hex;
      if(selectedIds.size){
        pushUndo();
        shapes.forEach(s=>{
          if(!selectedIds.has(s.id))return;
          s.color=cd.hex;s.zMm=cd.hole?0:cd.z;
        });
        redraw();
      }
      updateHoleBadge();
    };
    bot.insertBefore(wrap, firstSep);
  });
  // re-adicionar botão "+"
  const nonHole=COLOR_DEFS.filter(c=>!c.hole);
  if(nonHole.length<8){
    const addBtn=document.createElement('button');
    addBtn.id='btn-add-color';addBtn.className='col-wrap';
    addBtn.title='Adicionar cor';addBtn.style.cssText='cursor:pointer;justify-content:center;';
    addBtn.innerHTML='<div class="col-sw" style="background:var(--ant-color-fill-secondary);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--ant-color-text-secondary);font-weight:300">+</div><div class="col-lbl">Cor</div>';
    addBtn.onclick=()=>{
      const used=new Set(COLOR_DEFS.filter(c=>!c.hole).map(c=>c.hex));
      const next=PICO8_PALETTE.find(p=>!used.has(p.hex));
      if(!next)return;
      const holeIdx=COLOR_DEFS.findIndex(c=>c.hole);
      COLOR_DEFS.splice(holeIdx,0,{...next});
      rebuildSwatches();
    };
    bot.insertBefore(addBtn, firstSep);
  }
}

// ── Canvas coords → Clipper integer path (scale ×1000 for precision) ────
const CP_SCALE = 1000;
function shapeToClipper(s) {
  const pts = [], hw = s.w/2, hh = s.h/2;
  const cos = Math.cos(s.rot), sin = Math.sin(s.rot);
  function push(lx, ly) {
    const wx = s.x + lx*cos - ly*sin;
    const wy = s.y + lx*sin + ly*cos;
    pts.push({ X: Math.round(wx * CP_SCALE), Y: Math.round(wy * CP_SCALE) });
  }
  switch (s.type) {
    case 'rect': push(-hw,-hh);push(hw,-hh);push(hw,hh);push(-hw,hh); break;
    case 'circle':
      for(let i=0;i<64;i++){const a=i/64*Math.PI*2;push(Math.cos(a)*hw,Math.sin(a)*hh);} break;
    case 'triangle': push(0,-hh);push(hw,hh);push(-hw,hh); break;
    case 'star': {
      const sp=5;
      for(let i=0;i<sp*2;i++){const r=i%2===0?hw:hw*.42,a=i*Math.PI/sp-Math.PI/2;push(Math.cos(a)*r,Math.sin(a)*r);}
      break;
    }
    case 'heart':
      for(let i=0;i<60;i++){const t=i/60*Math.PI*2;
        push(hw*.8*Math.pow(Math.sin(t),3),
             -hh*(.8125*Math.cos(t)-.3125*Math.cos(2*t)-.125*Math.cos(3*t)-.0625*Math.cos(4*t)));} break;
    case 'hex':
      for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;push(Math.cos(a)*hw,Math.sin(a)*hh);} break;
    case 'arrow': {
      const bw=hw*.55,bh=hh*.45;
      [[-hw,-bh],[0,-bh],[0,-hh],[hw,0],[0,hh],[0,bh],[-hw,bh]].forEach(([x,y])=>push(x,y)); break;
    }
    case 'para': {
      const sh=hw*0.45;
      [[-hw+sh,-hh],[hw+sh,-hh],[hw-sh,hh],[-hw-sh,hh]].forEach(([x,y])=>push(x,y)); break;
    }
    case 'trap': {
      const tw=hw*0.55;
      [[-tw,-hh],[tw,-hh],[hw,hh],[-hw,hh]].forEach(([x,y])=>push(x,y)); break;
    }
    case 'diamond': {
      [[0,-hh],[hw,0],[0,hh],[-hw,0]].forEach(([x,y])=>push(x,y)); break;
    }
    case 'freehand':
      if (s.fhPoints) s.fhPoints.forEach(p=>pts.push({X:Math.round(p.x*CP_SCALE),Y:Math.round(p.y*CP_SCALE)}));
      break;
  }
  return pts;
}

// Clipper path → THREE.Shape (scene coords: canvas→scene, Y flipped)
function clipperToThreeShape(path, cw, ch) {
  if (!path || path.length < 3) return null;
  // escala: stage height = 200mm → 1px = 200/ch mm
  const sc = 200 / ch;
  const v2s = path.map(p => new THREE.Vector2(
    (p.X / CP_SCALE - cw/2) * sc,
    -(p.Y / CP_SCALE - ch/2) * sc
  ));
  return new THREE.Shape(v2s);
}

// Boolean difference: subject[] minus clips[] → array of result paths
function clipperDiff(subjectPaths, clipPaths) {
  if (!window.ClipperLib) return subjectPaths.map(p=>[p]);
  const cpr = new ClipperLib.Clipper();
  cpr.AddPaths(subjectPaths, ClipperLib.PolyType.ptSubject, true);
  cpr.AddPaths(clipPaths,    ClipperLib.PolyType.ptClip,    true);
  const solution = new ClipperLib.Paths();
  cpr.Execute(ClipperLib.ClipType.ctDifference, solution,
    ClipperLib.PolyFillType.pftNonZero, ClipperLib.PolyFillType.pftNonZero);
  return solution; // array of paths (some may be holes in clipper's winding sense)
}

function buildMesh3D() {
  if (mesh3) { scene3.remove(mesh3); mesh3 = null; }
  const group  = new THREE.Group();
  const cw     = canvas.width  || 800;
  const ch     = canvas.height || 600;
  const sc     = Math.min(cw, ch);

  const normals = shapes.filter(s => s.color !== HOLE_COLOR);
  const holes   = shapes.filter(s => s.color === HOLE_COLOR);

  // Pre-build all hole clipper paths once
  const holePaths = holes.map(h => shapeToClipper(h)).filter(p => p.length >= 3);

  normals.forEach(s => {
    const subjPath = shapeToClipper(s);
    if (subjPath.length < 3) return;

    // Garantir winding CCW (área >= 0) para o subject antes do diff
    if (ClipperLib && ClipperLib.Clipper) {
      const sArea = ClipperLib.Clipper.Area(subjPath);
      if (sArea < 0) subjPath.reverse();
    }

    // Boolean difference: cut all holes from this shape
    let resultPaths;
    if (holePaths.length > 0 && window.ClipperLib) {
      resultPaths = clipperDiff([subjPath], holePaths);
    } else {
      resultPaths = [subjPath];
    }

    if (!resultPaths || !resultPaths.length) return;

    // Clipper.Area > 0 = CCW = outer contour
    // Clipper.Area < 0 = CW  = inner hole
    const outers = [], inners = [];
    resultPaths.forEach(p => {
      if (!p || p.length < 3) return;
      const area = (ClipperLib && ClipperLib.Clipper) ? ClipperLib.Clipper.Area(p) : 1;
      if (area >= 0) outers.push(p);
      else           inners.push(p);
    });

    if (!window.ClipperLib) outers.push(...resultPaths);

    outers.forEach(outer => {
      const threeShape = clipperToThreeShape(outer, cw, ch);
      if (!threeShape) return;

      // Attach inner rings as holes in the THREE.Shape
      inners.forEach(inner => {
        const sc = 200 / ch;
        const hp = inner.map(p => new THREE.Vector2(
          (p.X / CP_SCALE - cw/2) * sc,
          -(p.Y / CP_SCALE - ch/2) * sc
        ));
        threeShape.holes.push(new THREE.Path(hp));
      });

      // derive Z from current colour (so recolouring updates height)
      const _cd = COLOR_DEFS.find(c=>c.hex===s.color);
      const _zMm = s.zMm || (_cd && !_cd.hole ? _cd.z : 1);
      // 1 unidade Three.js = 1px canvas = 1mm no STL — usar zMm directamente
      const geo = new THREE.ExtrudeGeometry(threeShape, {
        depth:          _zMm,
        bevelEnabled:   false,
      });
      const mat = new THREE.MeshPhongMaterial({
        color:    new THREE.Color(s.color),
        specular: new THREE.Color(0x222222),
        shininess: 60,
        side: THREE.DoubleSide,
      });
      group.add(new THREE.Mesh(geo, mat));
    });
  });

  if (!group.children.length) { scene3.add(group); mesh3 = group; return; }

  const box = new THREE.Box3().setFromObject(group);
  const ctr = new THREE.Vector3(); box.getCenter(ctr);
  group.children.forEach(c => c.position.sub(ctr));
  const sz = new THREE.Vector3(); box.getSize(sz);
  grid3.position.y = -(sz.y / 2 + 4);
  radius3 = Math.max(...sz.toArray()) * 2.2;
  updateCam3();
  scene3.add(group); mesh3 = group;
}

function fitAll(){
  if(!shapes.length){ vpZoom=1;vpPanX=0;vpPanY=0;redraw();return;}
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  shapes.forEach(s=>{
    const pts=s.fhPoints||[{x:s.x-s.w/2,y:s.y-s.h/2},{x:s.x+s.w/2,y:s.y+s.h/2}];
    pts.forEach(p=>{minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);});
  });
  const pad=60;
  const bw=maxX-minX+pad*2, bh=maxY-minY+pad*2;
  const cw=canvas.width,     ch=canvas.height;
  vpZoom=Math.min(cw/bw, ch/bh, 4);
  vpPanX=(cw-(maxX+minX)*vpZoom)/2;
  vpPanY=(ch-(maxY+minY)*vpZoom)/2;
  const _fp=Math.round(vpZoom*100)+'%';
  const _fv=document.getElementById('vpz-val');if(_fv)_fv.textContent=_fp;
  const _fv2=document.getElementById('zoom-val');if(_fv2)_fv2.textContent=_fp;
  redraw();
}

function resetView(){
  vpZoom=1;
  if(shapes.length){
    // centrar nas formas existentes a zoom=1
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    shapes.forEach(s=>{
      const pts=s.fhPoints||[{x:s.x-s.w/2,y:s.y-s.h/2},{x:s.x+s.w/2,y:s.y+s.h/2}];
      pts.forEach(p=>{mnX=Math.min(mnX,p.x);mnY=Math.min(mnY,p.y);mxX=Math.max(mxX,p.x);mxY=Math.max(mxY,p.y);});
    });
    vpPanX=canvas.width /2-(mnX+mxX)/2;
    vpPanY=canvas.height/2-(mnY+mxY)/2;
  } else {
    vpPanX=canvas.width/2;
    vpPanY=canvas.height/2;
  }
  const _rv=document.getElementById('vpz-val');if(_rv)_rv.textContent='100%';
  const _rv2=document.getElementById('zoom-val');if(_rv2)_rv2.textContent='100%';
  const _rb=document.getElementById('ruler-bar');
  if(_rb&&canvas.height)_rb.style.width=Math.round(10*(canvas.height/200))+'px';
  redraw();
}

function loadJSON(e){

  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data.shapes))throw new Error('Formato inválido');
      pushUndo();
      shapes=data.shapes.map(s=>({...s,fhPoints:s.fhPoints||undefined}));
      nextId=data.nextId||(Math.max(0,...shapes.map(s=>s.id))+1);
      selectedIds.clear();lasso=null;groupXform=null;

    }catch(err){showToast('⚠️ Erro: '+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
}

function downloadSTL(){
  if(!mesh3)return;
  const pos=[];
  mesh3.traverse(c=>{
    if(!c.isMesh)return;
    const g=c.geometry.clone();
    if(g.index)g.toNonIndexed();
    const p=g.attributes.position;
    for(let i=0;i<p.count;i++)pos.push(p.getX(i),p.getY(i),p.getZ(i));
  });
  const tri=pos.length/9;
  const buf=new ArrayBuffer(84+tri*50);
  const dv=new DataView(buf);
  const hdr='Monco3D';for(let i=0;i<hdr.length;i++)dv.setUint8(i,hdr.charCodeAt(i));
  dv.setUint32(80,tri,true);
  let off=84;
  for(let t=0;t<tri;t++){
    const b=t*9;
    const ax=pos[b],ay=pos[b+1],az=pos[b+2],bx=pos[b+3],by=pos[b+4],bz=pos[b+5],cx=pos[b+6],cy=pos[b+7],cz=pos[b+8];
    const ux=bx-ax,uy=by-ay,uz=bz-az,vx=cx-ax,vy=cy-ay,vz=cz-az;
    const nx=uy*vz-uz*vy,ny=uz*vx-ux*vz,nz=ux*vy-uy*vx,nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
    [nx/nl,ny/nl,nz/nl,ax,ay,az,bx,by,bz,cx,cy,cz].forEach(v=>{dv.setFloat32(off,v,true);off+=4;});
    dv.setUint16(off,0,true);off+=2;
  }
  const blob=new Blob([buf],{type:'application/octet-stream'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const _ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  a.href=url;a.download='monco_'+_ts+'.stl';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  unlockAch('stl');showToast('💾 STL guardado! Abre no Cura para imprimir.');
}

// Tamanhos canónicos das peças (em px, escalam com o canvas)
// Base unit U = min(cw,ch)*0.13 — tri pequeno ocupa U×U
// Cada tri. tangram é rectângulo isósceles: catetos = L, hypotenusa = L√2
// fhPoints em coords absolutas calculadas no momento do clique.
// Quadrado: tipo rect normal (não rotado). Para: tipo para.
//   'BL' = ângulo recto em Baixo-Esquerda  (L1)
//   'BR' = ângulo recto em Baixo-Direita   (L2)
//   'TL' = ângulo recto em Topo-Esquerda

// ── Viewport bar buttons (após DOM ready) ────────────────
function initVpBar(){
  function updZoom(){
    const pct=Math.round(vpZoom*100)+'%';
    const el=document.getElementById('vpz-val');
    if(el) el.textContent=pct;
    const zv=document.getElementById('zoom-val');
    if(zv) zv.textContent=pct;
    // actualizar régua: 10mm em píxeis de ecrã
    const rulerBar=document.getElementById('ruler-bar');
    if(rulerBar && canvas.height){
      const px10mm = 10 * (canvas.height / 200) * vpZoom;
      rulerBar.style.width = Math.round(px10mm) + 'px';
    }
  }
  function doZoom(factor){
    const mx=canvas.width/2, my=canvas.height/2;
    const nz=Math.max(0.1,Math.min(10,vpZoom*factor));
    vpPanX=mx-(mx-vpPanX)*(nz/vpZoom);
    vpPanY=my-(my-vpPanY)*(nz/vpZoom);
    vpZoom=nz; updZoom(); redraw();
  }
  const zo=document.getElementById('vpz-out');
  const zi=document.getElementById('vpz-in');
  const zf=document.getElementById('vpz-fit');
  const z1=document.getElementById('vpz-1');
  const zsn=document.getElementById('vpz-snap');
  const zgr=document.getElementById('vpz-grid');
  if(zo) zo.onclick=()=>doZoom(1/1.25);
  if(zi) zi.onclick=()=>doZoom(1.25);
  if(zf) zf.onclick=()=>{fitAll();updZoom();};
  if(z1) z1.onclick=()=>{resetView();updZoom();};
  if(zsn) zsn.onclick=()=>{
    snapOn=!snapOn;
    zsn.style.color=snapOn?'#1677ff':'';
    zsn.style.borderColor=snapOn?'#1677ff':'';
    const bs=document.getElementById('btn-snap');
    if(bs) bs.classList.toggle('active',snapOn);
    redraw();
  };
  if(zgr) zgr.onchange=()=>{snapSize=parseInt(zgr.value);redraw();};
  // hdr STL button disabled state
  function updStl(){
    const hs=document.getElementById('hdr-stl');
    if(hs) hs.style.opacity=shapes.length?'1':'.4';
  }
  // patch redraw to keep stl btn state
  const _origRedraw=redraw;
  // call updZoom once
  updZoom();
}
setTimeout(initVpBar,100);

// ── Confetti engine ───────────────────────
function launchConfetti(){
  const cv=document.getElementById('confetti-canvas');
  if(!cv)return;
  cv.style.display='block';
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const ctx2=cv.getContext('2d');
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*cv.width, y:-20,
    r:Math.random()*6+3,
    color:`hsl(${Math.random()*360},90%,60%)`,
    vx:(Math.random()-0.5)*6, vy:Math.random()*4+2,
    rot:Math.random()*360, rotV:(Math.random()-0.5)*8,
  }));
  let frame=0;
  function tick(){
    ctx2.clearRect(0,0,cv.width,cv.height);
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.vy+=0.07;
      ctx2.save(); ctx2.translate(p.x,p.y); ctx2.rotate(p.rot*Math.PI/180);
      ctx2.fillStyle=p.color;
      ctx2.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx2.restore();
    });
    frame++;
    if(frame<120) requestAnimationFrame(tick);
    else{ ctx2.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
  }
  tick();
}

let layersOpen = false;

// shape type → icon
function shapeIcon(type){
  return {rect:'▭',circle:'○',triangle:'△',star:'★',heart:'♥',
          hex:'⬡',arrow:'➤',trap:'⏢',diamond:'◆',freehand:'✏️',para:'▱'}[type]||'?';
}

function renderLayers(){
  const list=document.getElementById('layers-list');
  if(!list) return;
  list.innerHTML='';
  // ordem inversa: primeiro na lista = topo visual (último no array)
  [...shapes].reverse().forEach((s,ri)=>{
    const realIdx=shapes.length-1-ri;
    const item=document.createElement('div');
    item.className='layer-item'+(selectedIds.has(s.id)?' selected':'')+(s.hidden?' hidden-layer':'');
    item.dataset.id=s.id;

    // checkbox visibilidade
    const vis=document.createElement('div');
    vis.className='layer-vis';
    vis.title=s.hidden?'Mostrar':'Esconder';
    vis.textContent=s.hidden?'🙈':'👁️';
    vis.onclick=(e)=>{
      e.stopPropagation();
      s.hidden=!s.hidden;
      if(s.hidden&&selectedIds.has(s.id)) selectedIds.delete(s.id);
      redraw(); renderLayers();
    };

    // icon
    const icon=document.createElement('div');
    icon.className='layer-icon';
    icon.textContent=shapeIcon(s.type);

    // nome
    const name=document.createElement('div');
    name.className='layer-name';
    name.textContent=s.name||(s.type.charAt(0).toUpperCase()+s.type.slice(1));

    // id
    const idEl=document.createElement('div');
    idEl.className='layer-id';
    idEl.textContent='#'+s.id;

    // setas reordenar
    const arrows=document.createElement('div');
    arrows.className='layer-arrows';
    const up=document.createElement('button');
    up.className='layer-arr';up.textContent='▲';up.title='Mover para cima';
    up.onclick=(e)=>{
      e.stopPropagation();
      if(realIdx<shapes.length-1){
        [shapes[realIdx],shapes[realIdx+1]]=[shapes[realIdx+1],shapes[realIdx]];
        redraw();renderLayers();
      }
    };
    const dn=document.createElement('button');
    dn.className='layer-arr';dn.textContent='▼';dn.title='Mover para baixo';
    dn.onclick=(e)=>{
      e.stopPropagation();
      if(realIdx>0){
        [shapes[realIdx],shapes[realIdx-1]]=[shapes[realIdx-1],shapes[realIdx]];
        redraw();renderLayers();
      }
    };
    arrows.appendChild(up);arrows.appendChild(dn);

    item.appendChild(vis);item.appendChild(icon);
    item.appendChild(name);item.appendChild(idEl);
    item.appendChild(arrows);

    // clicar na layer selecciona a shape
    item.onclick=()=>{
      if(s.hidden) return;
      selectedIds=new Set([s.id]);
      redraw();renderLayers();
    };
    list.appendChild(item);
  });
}

function toggleLayers(){
  layersOpen=!layersOpen;
  const panel=document.getElementById('layers-panel');
  const btn=document.getElementById('btn-layers-fixed');
  panel.classList.toggle('open',layersOpen);
  if(btn) btn.classList.toggle('active',layersOpen);
  if(layersOpen) renderLayers();
}

// Drag do painel de layers
(function(){
  const handle=document.getElementById('lp-drag-handle');
  const panel=document.getElementById('layers-panel');
  if(!handle||!panel)return;
  let dragging=false,ox=0,oy=0,px=0,py=0;
  handle.addEventListener('pointerdown',e=>{
    dragging=true;
    const r=panel.getBoundingClientRect();
    ox=e.clientX-r.left; oy=e.clientY-r.top;
    handle.setPointerCapture(e.pointerId);
    e.stopPropagation();
  });
  handle.addEventListener('pointermove',e=>{
    if(!dragging)return;
    const stage=document.getElementById('stage').getBoundingClientRect();
    px=e.clientX-stage.left-ox;
    py=e.clientY-stage.top-oy;
    panel.style.left=Math.max(0,px)+'px';
    panel.style.top=Math.max(0,py)+'px';
    e.stopPropagation();
  });
  handle.addEventListener('pointerup',()=>{dragging=false;});
})();
